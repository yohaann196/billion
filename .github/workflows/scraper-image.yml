name: Build & Push Scraper Image

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile.scraper"
      - "apps/scraper/**"
      - "packages/db/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"

concurrency:
  group: scraper-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.scraper
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/scraper:latest
            ghcr.io/${{ github.repository }}/scraper:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
